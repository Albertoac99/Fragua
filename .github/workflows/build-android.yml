name: build-android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Tests
        run: flutter test

      - name: Restaurar keystore release
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/fragua-release.jks

      - name: Generar key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=fragua-release.jks
          EOF

      - name: Build APK release
        run: flutter build apk --release

      - name: Renombrar APK
        env:
          REF_NAME: ${{ github.ref_name }}
        run: cp build/app/outputs/flutter-apk/app-release.apk "Fragua-${REF_NAME}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: Fragua-apk
          path: Fragua-*.apk

      - name: Publicar Release con el APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: Fragua-*.apk
